version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vinfast_postgres
    environment:
      POSTGRES_USER: vinfast_user
      POSTGRES_PASSWORD: vinfast_password
      POSTGRES_DB: vinfast
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinfast_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vinfast_frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      DATABASE_URL: postgresql://vinfast_user:vinfast_password@postgres:5432/vinfast
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: Admin@1234
      ADMIN_TOKEN: vinfast_admin_quynhhoa_140894@#
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
